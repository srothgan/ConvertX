# This compose file is for development and testing purposes only. See README for production deployment instructions.

services:
  convertx:
    build:
      context: .
      # dockerfile: Debian.Dockerfile
    volumes:
      - ./data:/app/data
    environment: # Defaults are listed below. All are optional.
      - NODE_ENV=development
      - AUTHENTIK_DEV_MODE=true # local-only demo identity for testing without authentik/Nginx
      - AUTHENTIK_DEV_UID=local-admin
      - AUTHENTIK_DEV_EMAIL=demo@mail.de
      - AUTHENTIK_DEV_USERNAME=demo
      - AUTHENTIK_DEV_NAME=ConvertX Demo Admin
      - AUTHENTIK_DEV_GROUPS=admins|users
      - AUTHENTIK_ADMIN_GROUPS=admins
      - AUTHENTIK_USER_GROUPS=users,admins
      - AUTO_DELETE_EVERY_N_HOURS=1 # checks every n hours for files older then n hours and deletes them, set to 0 to disable
      # - FFMPEG_ARGS=-hwaccel vulkan # additional arguments to pass to ffmpeg
      # - WEBROOT=/convertx # the root path of the web interface, leave empty to disable
      # - HIDE_HISTORY=true # hides the history tab in the web interface, defaults to false
      - TZ=Europe/Berlin # set your timezone, defaults to UTC
    ports:
      - 127.0.0.1:3000:3000
